events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream rondines_web {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 20M;

        # ── PWA: sin caché para que el Service Worker se actualice siempre ──────────
        location = /sw.js {
            default_type application/javascript;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* \.webmanifest$ {
            default_type application/manifest+json;
            add_header Cache-Control "no-cache";
        }

        # ── Assets fingerprinted por Vite: caché agresivo ───────────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── WebSocket (Django Channels / Daphne) ─────────────────────────────────────
        location /ws/ {
            proxy_pass http://rondines_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── Media files: servidos directamente por nginx ─────────────────────────────
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Django: API, admin, static ───────────────────────────────────────────────
        location ~ ^/(api|admin|static)/ {
            proxy_pass http://rondines_web;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            client_max_body_size 20M;
            proxy_read_timeout 60s;
        }

        # ── SPA fallback (React Router) ──────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
